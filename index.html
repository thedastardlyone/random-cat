<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Kitty Generator</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow: hidden; /* Prevents both horizontal and vertical scrollbars from the background chaos */
        }

        /* --- Dynamic Background Text Base --- */
        .bg-text {
            position: fixed;
            user-select: none;
            pointer-events: none; /* Let clicks pass right through to buttons */
            z-index: 0;
            white-space: nowrap;
            will-change: transform, opacity; /* Keeps animations butter-smooth */
        }

        /* --- Animations --- */
        @keyframes floatUp {
            0% { top: 115%; }
            100% { top: -15%; }
        }

        @keyframes floatLeft {
            0% { left: 125%; }
            100% { left: -25%; }
        }

        @keyframes floatRight {
            0% { left: -25%; }
            100% { left: 125%; }
        }

        @keyframes strobe {
            0%, 100% { opacity: var(--base-opacity); }
            50% { opacity: 0.01; } /* Drops down to near invisible */
        }

        .container {
            position: relative;
            z-index: 1; /* Keeps the main app locked above the background chaos */
            text-align: center;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            color: #222;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .image-frame {
            width: 100%;
            height: 40vh; 
            min-height: 260px;
            max-height: 380px;
            border-radius: 14px;
            overflow: hidden;
            background-color: #1a1a1a; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        /* --- Breed and Data Information Section --- */
        .info-box {
            margin: 16px 0 20px 0;
            min-height: 85px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .breed-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2c3e50;
            margin: 0;
        }

        .cat-id {
            font-size: 0.85rem;
            color: #7f8c8d;
            font-family: 'Courier New', Courier, monospace;
            background-color: #f8f9fa;
            padding: 3px 8px;
            border-radius: 5px;
            margin: 0;
        }

        .wiki-link {
            display: inline-flex;
            align-items: center;
            color: #3498db;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 2px;
        }

        .wiki-link:hover {
            text-decoration: underline;
        }

        /* --- Spinning Cat Silhouette Loader --- */
        .cat-loader {
            position: relative;
            width: 70px;
            height: 52px;
            background-color: #3498db;
            border-radius: 50% 50% 45% 45%;
            animation: spin 1.5s linear infinite;
        }

        .cat-loader::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 2px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 22px solid #3498db;
            transform: rotate(-25deg);
        }

        .cat-loader::after {
            content: '';
            position: absolute;
            top: -10px;
            right: 2px;
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 22px solid #3498db;
            transform: rotate(25deg);
        }

        .primary-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 16px 32px; 
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        .primary-btn:disabled {
            background-color: #bdc3c7;
            box-shadow: none;
            cursor: not-allowed;
        }

        @media (hover: hover) {
            .primary-btn:hover {
                background-color: #2980b9;
            }
        }

        .primary-btn:active {
            transform: scale(0.96);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 Random Kitty Generator</h1>
        
        <div class="image-frame">
            <div id="loader" class="cat-loader"></div>
            <img id="cat-image" src="" alt="A cute cat">
        </div>

        <div class="info-box">
            <p id="breed-display" class="breed-name">Loading details...</p>
            <p id="id-display" class="cat-id"></p>
            <div id="wiki-container"></div>
        </div>

        <button id="fetch-btn" class="primary-btn">Get Another Cat</button>
    </div>

    <script>
        const catImage = document.getElementById('cat-image');
        const loader = document.getElementById('loader');
        const fetchBtn = document.getElementById('fetch-btn');
        const breedDisplay = document.getElementById('breed-display');
        const idDisplay = document.getElementById('id-display');
        const wikiContainer = document.getElementById('wiki-container');

        // --- Generate Heavy Scrolling & Flashing Multi-Directional Background ---
        function createBackgroundText() {
            const fonts = [
                'Impact, Haettenschweiler, sans-serif',
                '"Comic Sans MS", cursive, sans-serif',
                '"Courier New", Courier, monospace',
                '"Georgia", serif',
                '"Arial Black", Gadget, sans-serif',
                '"Times New Roman", Times, serif'
            ];
            
            const totalPhrases = 75; 

            for (let i = 0; i < totalPhrases; i++) {
                const el = document.createElement('div');
                el.className = 'bg-text';
                el.innerText = 'DAMN FINE KITTY!!!';
                
                const baseOpacity = (Math.random() * 0.12) + 0.03; // Keeping it soft so 75 grid elements don't block the UI
                const fontSize = Math.floor(Math.random() * 26) + 14; 
                const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
                
                // Fast strobe timing
                const flashDuration = (Math.random() * 0.4) + 0.1; 

                // Splitting animation paths into three directional categories
                let animationType = 'floatUp';
                let rotation = 0;
                let scrollDuration = (Math.random() * 16) + 6;
                let scrollDelay = Math.random() * -25;

                // 1/3 Roll Left, 1/3 Roll Right, 1/3 Float Up
                const directionSelector = i % 3;

                if (directionSelector === 0) {
                    // Vertical Upward Track (Sideways Angles)
                    animationType = 'floatUp';
                    const left = Math.random() * 100;
                    el.style.left = `${left}%`;
                    rotation = Math.random() > 0.5 ? Math.floor(Math.random() * 30) + 75 : Math.floor(Math.random() * 30) - 105;
                } else if (directionSelector === 1) {
                    // Horizontal Left-To-Right Track (Mostly flat or slightly angled)
                    animationType = 'floatRight';
                    const top = Math.random() * 100;
                    el.style.top = `${top}%`;
                    rotation = Math.floor(Math.random() * 20) - 10; // -10deg to 10deg
                } else {
                    // Horizontal Right-To-Left Track
                    animationType = 'floatLeft';
                    const top = Math.random() * 100;
                    el.style.top = `${top}%`;
                    rotation = Math.floor(Math.random() * 20) - 10; 
                }

                el.style.fontSize = `${fontSize}px`;
                el.style.fontFamily = randomFont;
                el.style.setProperty('--base-opacity', baseOpacity);
                
                el.style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                el.style.animation = `
                    ${animationType} ${scrollDuration}s linear ${scrollDelay}s infinite, 
                    strobe ${flashDuration}s ease-in-out infinite alternate
                `;

                document.body.appendChild(el);
            }
        }

        async function fetchCat() {
            loader.style.display = 'block';
            catImage.style.display = 'none';
            fetchBtn.disabled = true;
            fetchBtn.innerText = 'Loading Cat...';
            
            breedDisplay.innerText = "Identifying breed...";
            idDisplay.innerText = "";
            wikiContainer.innerHTML = "";

            const startTime = Date.now();

            try {
                const response = await fetch('https://api.thecatapi.com/v1/images/search?has_breeds=1');
                const data = await response.json();
                
                const catData = data[0];
                const nextImgUrl = catData.url;

                await preloadImage(nextImgUrl);

                const elapsedTime = Date.now() - startTime;
                const minimumDisplayTime = 2000; 

                if (elapsedTime < minimumDisplayTime) {
                    const remainingTime = minimumDisplayTime - elapsedTime;
                    setTimeout(() => showCat(catData), remainingTime);
                } else {
                    showCat(catData);
                }

            } catch (error) {
                console.error('Error fetching the kitty image:', error);
                alert('Failed to fetch a kitty. Try again!');
                loader.style.display = 'none';
                breedDisplay.innerText = "Error loading kitty.";
                fetchBtn.disabled = false;
                fetchBtn.innerText = 'Get Another Kitty';
            }
        }

        function preloadImage(url) {
            return new Promise((resolve) => {
                catImage.src = url;
                catImage.onload = () => resolve();
            });
        }

        function showCat(catData) {
            loader.style.display = 'none';
            catImage.style.display = 'block';
            fetchBtn.disabled = false;
            fetchBtn.innerText = 'Get Another Kitty';

            if (catData.id) {
                idDisplay.innerText = `ID: ${catData.id}`;
            }

            if (catData.breeds && catData.breeds.length > 0) {
                const breedInfo = catData.breeds[0];
                breedDisplay.innerText = breedInfo.name;

                if (breedInfo.wikipedia_url) {
                    wikiContainer.innerHTML = `<a href="${breedInfo.wikipedia_url}" target="_blank" class="wiki-link">Learn more on Wikipedia ↗</a>`;
                }
            } else {
                breedDisplay.innerText = "Unknown Breed";
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            createBackgroundText();
            fetchCat();
        });
        fetchBtn.addEventListener('click', fetchCat);
    </script>
</body>
</html>
